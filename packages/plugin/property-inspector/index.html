<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 12px;
            color: #d8d8d8;
            background: #2d2d2d;
            padding: 12px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 14px 0 6px;
        }
        .section-label:first-child { margin-top: 0; }

        label {
            display: block;
            margin-bottom: 2px;
            color: #bbb;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 5px 8px;
            background: #1c1c1c;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e8e8e8;
            font-size: 12px;
            margin-bottom: 8px;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #0078d4;
        }

        .note {
            font-size: 11px;
            color: #777;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .btn-row {
            margin-top: 12px;
        }

        button {
            width: 100%;
            padding: 7px 0;
            background: #0078d4;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #0067b8; }
        button:active { background: #005fa3; }

        #status {
            margin-top: 8px;
            font-size: 11px;
            text-align: center;
            min-height: 16px;
            color: #4caf50;
        }
        #status.error { color: #f44336; }
    </style>
</head>
<body>

    <div class="section-label">Claude (Anthropic API)</div>
    <p class="note">Anthropic API キーをお持ちの場合のみ。Claude.ai サブスクリプションには不要です。</p>
    <label for="claudeApiKey">API キー</label>
    <input type="password" id="claudeApiKey" placeholder="sk-ant-api-... または sk-ant-admin-..." autocomplete="off" />

    <div class="section-label">xAI</div>
    <label for="xaiApiKey">API キー</label>
    <input type="password" id="xaiApiKey" placeholder="xai-..." autocomplete="off" />
    <label for="xaiTeamId">チーム ID</label>
    <input type="text" id="xaiTeamId" placeholder="team_..." autocomplete="off" />

    <div class="section-label">Codex (ChatGPT)</div>
    <p class="note">~/.codex/auth.json を自動参照します。設定不要です。</p>

    <div class="btn-row">
        <button id="saveBtn">保存</button>
    </div>
    <div id="status"></div>

    <script>
        let ws = null;
        let uuid = null;

        // Stream Deck software calls this function when the property inspector loads
        window.connectElgatoStreamDeckSocket = function (port, inUUID, registerEvent, _info) {
            uuid = inUUID;
            ws = new WebSocket("ws://127.0.0.1:" + port);

            ws.onopen = function () {
                ws.send(JSON.stringify({ event: registerEvent, uuid: inUUID }));
                ws.send(JSON.stringify({ event: "getGlobalSettings", context: inUUID }));
            };

            ws.onmessage = function (evt) {
                const msg = JSON.parse(evt.data);
                if (msg.event === "didReceiveGlobalSettings") {
                    const s = msg.payload.settings || {};
                    document.getElementById("claudeApiKey").value = s.claudeApiKey || "";
                    document.getElementById("xaiApiKey").value    = s.xaiApiKey    || "";
                    document.getElementById("xaiTeamId").value    = s.xaiTeamId    || "";
                }
            };
        };

        document.getElementById("saveBtn").addEventListener("click", function () {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showStatus("接続エラー", true);
                return;
            }
            const settings = {
                claudeApiKey: document.getElementById("claudeApiKey").value.trim(),
                xaiApiKey:    document.getElementById("xaiApiKey").value.trim(),
                xaiTeamId:    document.getElementById("xaiTeamId").value.trim(),
            };
            ws.send(JSON.stringify({ event: "setGlobalSettings", context: uuid, payload: settings }));
            showStatus("保存しました");
        });

        function showStatus(msg, isError) {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.className = isError ? "error" : "";
            setTimeout(function () { el.textContent = ""; el.className = ""; }, 2000);
        }
    </script>
</body>
</html>
