name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @ai-monitor/shared build

      - name: Test shared
        run: pnpm --filter @ai-monitor/shared test

      - name: Build collector
        run: pnpm --filter @ai-monitor/collector build

      - name: Test collector
        run: pnpm --filter @ai-monitor/collector test

      - name: Build plugin
        run: pnpm --filter com.antigravity.aimonitor build

  package-plugin:
    name: Package Plugin
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Stage plugin package
        run: node scripts/stage-plugin.mjs

      - name: Validate plugin
        run: pnpm --package=@elgato/cli dlx streamdeck validate dist/com.antigravity.aimonitor.sdPlugin

      - name: Package plugin
        run: pnpm --package=@elgato/cli dlx streamdeck pack dist/com.antigravity.aimonitor.sdPlugin --output dist

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: dist/*.streamDeckPlugin
          retention-days: 30

  publish-release:
    name: Publish Release
    needs: package-plugin
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download packaged plugin
        uses: actions/download-artifact@v4
        with:
          name: streamdeck-plugin
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.streamDeckPlugin
          generate_release_notes: true
